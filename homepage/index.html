<!DOCTYPE html>
<html>
<head>
    <title>newtab</title>
    <link rel="stylesheet" href="style.css"/>
    <link rel="icon" type="image/x-icon" href="favicon.ico"/>
    <script>
    function parseStatuses(markdown) {
        return markdown
            .split('\n')
            .map(line => line.trim())
            .filter(line => line.length > 0);
    }
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }
    fetch('https://raw.githubusercontent.com/Bajortski/bajortski.github.io/refs/heads/main/statuses.md')
        .then(response => response.text())
        .then(markdown => {
            const statuses = parseStatuses(markdown);
            shuffle(statuses);
            const space = '&nbsp;'.repeat(4);
            const joined = space + statuses.join(' ◇ ');
            document.getElementById('markdown-content').innerHTML = joined;
        });
    </script>
   <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
    </style>
</head>
<body>
    <img src="https://raw.githubusercontent.com/Bajortski/bajortski.github.io/c25e247330405370345f2931289738db73eeee9c/MuppeToast-BandW.svg" height="400"/>
    <table>
        <tr>
            <td>
                <div class="marquee">
                    <p id="markdown-content"></p>
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
