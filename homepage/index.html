<!DOCTYPE html>
<html>
<head>
    <title>newtab</title>
    <link rel="stylesheet" href="style.css"/>
    <link rel="icon" type="image/x-icon" href="favicon.ico"/>
</head>
<body>
    <div class="container">
        <div class="content">
            <form action="https://kagi.com/search" method="get">
                <table class="header">
                    <tr>
                        <th colspan="2" class="width-auto">
                            <h1 id="greeting" style="text-align: center;"></h1>
                            <div class="marquee">
                                <p id="markdown-content"></p>
                            </div>
                        </th>
                    </tr>
                    <tr>
                        <td style="width: 100%; vertical-align: middle;">
                            <input type="text" name="q" style="outline: none; border: none;" placeholder="Search...">
                        </td>
                        <td style="white-space: nowrap; vertical-align: middle;">
                            <button type="submit" style="outline: none; border: none;">Go!</button>
                        </td>
                    </tr>
                </table>
            </form>
        </div>
    </div>
    <footer>
        <p style="text-align: center; font-size: smaller; margin-top: 1em;">
            &copy; 2024-2026 Toast Bajortski. Rights.
        </p>
    </footer>
    <script>
        // Greeting
        const hour = new Date().getHours();
        let greeting;
        if (hour < 12) greeting = "Good morning!";
        else if (hour < 18) greeting = "Good afternoon!";
        else greeting = "Good evening!";
        document.getElementById("greeting").textContent = greeting;

        // Marquee
        function parseStatuses(markdown) {
            return markdown
                .split('\n')
                .map(line => line.trim())
                .filter(line => line.length > 0);
        }
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        fetch('https://raw.githubusercontent.com/Bajortski/bajortski.github.io/refs/heads/main/statuses.md')
            .then(response => response.text())
            .then(markdown => {
                const statuses = parseStatuses(markdown);
                shuffle(statuses);
                const space = '&nbsp;'.repeat(4);
                document.getElementById('markdown-content').innerHTML = space + statuses.join('  -  ');
            });

        fetch('https://raw.githubusercontent.com/Bajortski/bajortski.github.io/refs/heads/main/version.md')
            .then(response => response.text())
            .then(version => {
                const versionCell = document.getElementById('version-cell');
                if (versionCell) versionCell.textContent = version.trim();
            });
    </script>
</body>
</html>
